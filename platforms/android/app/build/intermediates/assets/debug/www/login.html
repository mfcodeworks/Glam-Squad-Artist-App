<!DOCTYPE html>
    <head>
        <!-- https://github.com/apache/cordova-plugin-whitelist/blob/master/README.md#content-security-policy -->
        <meta 
            http-equiv="Content-Security-Policy" 
            content="default-src * 'unsafe-inline' data: blob: gap:; 
                script-src 'self' 'unsafe-eval' blob: data: https://api.mapbox.com https://glam-squad-db.nygmarosebeauty.com; 
                connect-src * data: blob:;">
        <meta name="format-detection" content="telephone=no">
        <meta name="msapplication-tap-highlight" content="no">
        <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width">
        <link rel="shortcut icon" href="img/logo-white.png">
        <link rel='dns-prefetch' href='https://api.mapbox.com' />
        <link rel='dns-prefetch' href='https://glam-squad-db.nygmarosebeauty.com' />
        <title>NR Glam Squad</title>

        <!-- Page CSS -->
        <link rel="stylesheet" type="text/css" href="css/bootstrap/bootstrap.min.css">
        <link rel="stylesheet" type="text/css" href="css/fontawesome/all.min.css">
        <link rel="stylesheet" type="text/css" href="css/custom.css">
    </head>
    <body class='clr-dark'>

        <!-- Splash Screen -->
        <div id='splash-screen' class='clr-white'>
            <img src="img/lips-loading_transparent.gif" id="splash-screen-inner">
        </div>
        <!-- /Splash Screen -->

        <!-- Navigation -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-black" data-role="header">
            <a class="navbar-brand" href="#"></a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item active">
                        <a class="nav-link" href="#">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Terms &amp; Conditions</a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Login Form -->
        <div class="container">
            <div class="col-lg-10 col-sm-10 col-xs 10" data-role="none" id="login-form-container">
                <form action='' id='login-form'>
                    <div class='form-group list-group-item clr-dark'>
                        <i class="fas fa-user"></i> Username
                        <input type='text' name='email' class='form-control input-dark' id='login-username'>
                    </div>
                    <div class='form-group list-group-item clr-dark'>
                        <i class="fas fa-lock"></i> Password
                        <input type='password' name='password' class='form-control input-dark' id='login-password'>
                    </div>
                    <div class='text-center list-group-item clr-dark'>
                      <button type='submit' id="btn-login-email" class='btn clr-primary btn-social' data-role="none"><i class='fas fa-user'></i> Login</button>
                      <button type='button' id="btn-register" class='btn clr-primary btn-social' data-toggle="modal" data-target="#register-dialog-modal"><i class='fas fa-user-plus'></i> Sign Up</button>
                    </div>
                </form>
            </div>
        </div>
        <!-- /Login Form -->

        <!-- Modal Dialogs -->
        <div class="modal" id="register-dialog-modal">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content clr-dark">
          
                    <!-- Modal Header -->
                    <div class="modal-header clr-dark">
                        <h4 class="modal-title">New Artist</h4>
                    </div>
          
                    <!-- Modal body -->
                    <div class="modal-body clr-dark">
                        <!-- Modal Content -->
                        <form action='' id='register-form'>
                            <div class="form-group list-group-item clr-dark">
                                <label for="event-card-selection">Country (If yours isn't listed, Glam Squad isn't available there yet)</label>
                                <select class="form-control" id="reg-country">
                                    <option value="SG">Singapore</option>
                                </select>
                            </div>
                            <div class='form-group list-group-item clr-dark'>
                                <i class="fas fa-user"></i> Username
                                <input type='text' name='username' class='form-control' id='reg-username'>
                            </div>
                            <div class='form-group list-group-item clr-dark'>
                                <i class="far fa-envelope"></i> Email
                                <input type='text' name='email' class='form-control' id='reg-email'>
                            </div>
                            <div class='form-group list-group-item clr-dark'>
                                <i class="fas fa-lock"></i> Password
                                <input type='password' name='password' class='form-control' id='reg-password'>
                            </div>
                            <div class='form-group list-group-item clr-dark'>
                                <i class="fas fa-lock"></i> Password
                                <input type='password' name='password2' class='form-control' id='reg-password2'>
                            </div>
                            <div class='form-group list-group-item clr-dark'>
                                <i class="fas fa-book-open"></i> Bio
                                <textarea name='bio' class='form-control' id='reg-bio' rows="5" placeholder="Certified makeup artist. Worked for Nicki & Cardi and provide the best brows you'll ever have"></textarea>
                            </div>
                            <div class='form-group list-group-item clr-dark'>
                                <label for="reg-role"><i class="fas fa-users"></i> Role</label>
                                <select class="form-control" id="reg-role">
                                </select>
                            </div>
                            <div class='form-group list-group-item clr-dark'>
                                <i class="fab fa-instagram"></i> Instagram
                                <input type='text' name='instagram' class='form-control' id='reg-instagram' placeholder="nygmarose">
                            </div>
                            <div class='form-group list-group-item clr-dark'>
                                <i class="fab fa-twitter"></i> Twitter
                                <input type='text' name='twitter' class='form-control' id='reg-twitter' placeholder="nygmarose">
                            </div>
                            <div class='form-group list-group-item clr-dark'>
                                <i class="fab fa-facebook"></i> Facebook
                                <input type='text' name='facebook' class='form-control' id='reg-facebook' placeholder="nygmarosebeauty">
                            </div>
                            <div class="form-group list-group-item clr-dark">
                                <label for="reg-portfolio" class="btn clr-primary" id="reg-portfolio-label">
                                    <i class="far fa-images"> Portfolio</i>
                                </label>
                                <input type="file" class="form-control d-none" id="reg-portfolio" name="reg-portfolio[]" multiple>
                            </div>
                            <ul class="form-group list-group-item clr-dark" id="reg-portfolio-preview"></ul>
                        </form>
                    </div>
                
                    <!-- Modal footer -->
                    <div class="modal-footer clr-dark">
                        <button type="button" class="btn clr-cancel" id="btn-cancel-register" data-dismiss="modal">Cancel</button>
                        <button type="button" class="btn clr-primary" id="btn-confirm-register">Sign Up</button>
                    </div>
          
                </div>
            </div>
        </div>
        <!-- /Modal Dialogs -->

        <!-- JS Scripts -->
        <script type="text/javascript" src="cordova.js"></script>
        <script type="text/javascript" src="js/login.bundle.js"></script>
    </body>
</html>
