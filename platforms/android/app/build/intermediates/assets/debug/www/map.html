<!DOCTYPE html>
    <head>
        <!-- https://github.com/apache/cordova-plugin-whitelist/blob/master/README.md#content-security-policy -->
        <meta 
            http-equiv="Content-Security-Policy" 
            content="default-src * 'unsafe-inline' data: blob: gap:;
                script-src 'self' 'unsafe-eval' blob: data: gap: https://api.mapbox.com https://js.stripe.com; 
                connect-src * data: blob:;">
        <meta name="format-detection" content="telephone=no">
        <meta name="msapplication-tap-highlight" content="no">
        <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width">
        <link rel="shortcut icon" href="img/logo-white.png">
        <link rel='dns-prefetch' href='//api.mapbox.com' />
        <link rel='dns-prefetch' href='//glam-squad-db.nygmarosebeauty.com' />
        <title>NR Glam Squad</title>

        <!-- Page CSS -->
        <link rel="stylesheet" type="text/css" href="css/bootstrap/bootstrap.min.css">
        <link rel="stylesheet" type="text/css" href="css/fontawesome/all.min.css">

        <link rel='stylesheet' href='https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v2.3.0/mapbox-gl-geocoder.css' type='text/css' />

        <!-- Custom Map CSS -->
        <link rel="stylesheet" href="css/map.css" type="text/css" >
    </head>
    <body>

        <!-- Side menu -->
        <div class="side-menu-toggler">
            <i class="fas fa-bars toggler-icon" data-toggle="collapse" data-target="#side-menu-links" aria-expanded="false" aria-controls="side-menu-links"></i>
            <div class="collapse navbar-collapse" id="side-menu-links">
                <ul class="navbar-nav mr-auto clr-primary side-menu-link-display">
                    <li class="nav-item active">
                        <a class="text-white p" href="map.html">Map</a>
                    </li>
                    <li class="nav-item">
                        <a class="text-white p" href="settings.html">Settings</a>
                    </li>
                    <li class="nav-item">
                        <a class="text-white p" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="text-white p" href="#">Terms & Conditions</a>
                    </li>
                    <li class="nav-item">
                        <a class="text-white p" id="btn-logout" href="#">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
        <!-- /Side menu -->

        <div id="map">
            <!-- Mapbox GL JS Map -->
            <div id='splash-screen'>
                <img src="img/lips-loading_transparent.gif" id="splash-screen-inner">
            </div>
        </div>

        <div id='geocoder' class='geocoder'>
            <!-- Mapbox GL JS Geocoder Input -->
        </div>

        <!-- Notification menu -->
        <div class="notification-menu-toggler">
            <i class="fas fa-bell toggler-icon" data-toggle="collapse" data-target="#notification-menu" aria-expanded="false" aria-controls="side-menu-links"></i>
            <div class="collapse navbar-collapse" id="notification-menu">
                <ul class="list-group list-group-flush clr-primary notification-menu-display" id="notification-list">
                    <li class="nav-item active">
                        <a class="text-white p" href="#">Empty</a>
                    </li>
                </ul>
            </div>
        </div>
        <!-- /Notification menu -->

        <!-- Modal Dialogs -->
        <div class="modal" id="event-info-modal">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content clr-dark">
          
                    <!-- Modal Header -->
                    <div class="modal-header clr-dark">
                        <p class="modal-title display-4 strong">Accept Booking</p>
                    </div>
          
                    <!-- Modal body -->
                    <div class="modal-body clr-dark text-center" id="event-information">
                        <!-- Address -->
                        <!-- Datetime -->
                        <!-- Client -->
                        <!-- Client Rating -->
                        <!-- Reference photos -->
                        <!-- Note -->
                    </div>
                
                    <!-- Modal footer -->
                    <div class="modal-footer clr-dark">
                        <button type="button" class="btn clr-cancel" id="btn-close-event" data-dismiss="modal">Cancel</button>
                        <button type="button" class="btn clr-primary" id="btn-accept-event">Accept</button>
                    </div>
          
                </div>
            </div>
        </div>
        <!-- /Modal Dialogs -->

        <!-- JS Scripts -->
        <script type="text/javascript" src="cordova.js"></script>
        <script type="text/javascript" src="js/map.bundle.js"></script>
    </body>
</html>
