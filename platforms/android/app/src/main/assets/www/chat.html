<!DOCTYPE html>
    <head>
        <!-- https://github.com/apache/cordova-plugin-whitelist/blob/master/README.md#content-security-policy -->
        <meta 
            http-equiv="Content-Security-Policy" 
            content="default-src * 'unsafe-inline' data: blob: gap: ws: wss:;
                script-src 'self' 'unsafe-eval' blob: data: gap: https://api.mapbox.com https://js.stripe.com https://glam-squad-db.nygmarosebeauty.com connect.facebook.net https://apis.google.com https://fcm.googleapis.com/fcm/notification cdnjs.cloudflare.com https://media.us1.twilio.com;
                connect-src * data: blob: ws: wss: https://fcm.googleapis.com/fcm/notification https://media.us1.twilio.com;">
		<meta name="format-detection" content="telephone=no">
        <meta name="msapplication-tap-highlight" content="no">
        <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width">
        <meta name="referrer" content="no-referrer" />
        <link rel="shortcut icon" href="img/logo-white.png">
        <link rel='dns-prefetch' href='//api.mapbox.com' />
        <link rel='dns-prefetch' href='//glam-squad-db.nygmarosebeauty.com' />
        <link rel='dns-prefetch' href='//js.stripe.com' />
        <link rel='dns-prefetch' href='//cdnjs.cloudflare.com' />
        <title>NR Glam Squad</title>
        <!-- Page CSS -->
        <link rel="stylesheet" type="text/css" href="css/bootstrap/bootstrap.min.css">
        <link rel="stylesheet" type="text/css" href="css/fontawesome/all.min.css">
		<link rel="stylesheet" type="text/css" href="css/custom.css">
		<link rel="stylesheet" type="text/css" href="css/lightbox.css">
		<link rel="stylesheet" type="text/css" href="css/chat.css">
	</head>
	<body>
		<!-- Channels Container -->
		<div class="chat" id="channels">
			<div class="card contacts_card">

				<!-- Search Box Header -->
				<div class="card-header">
					<div class="input-group">
						<input type="text" placeholder="Search..." name="" class="form-control search">
						<div class="input-group-prepend">
							<span class="input-group-text search_btn"><i class="fas fa-search"></i></span>
						</div>
					</div>
				</div>
				<!-- /Search Box Header -->

				<!-- Channel List -->
				<div class="card-body contacts_body">
					<ui class="contacts">

						<!-- Template Channel
						<li class="channel">
							<div class="d-flex bd-highlight">
								<div class="img_cont">
									<img src="https://2.bp.blogspot.com/-8ytYF7cfPkQ/WkPe1-rtrcI/AAAAAAAAGqU/FGfTDVgkcIwmOTtjLka51vineFBExJuSACLcBGAs/s320/31.jpg" class="rounded-circle user_img">
									<span class="online_icon offline"></span>
								</div>
								<div class="user_info">
									<span>Sahar Darya</span>
									<p>Sahar left 7 mins ago</p>
								</div>
							</div>
						</li>
						/Template Channel -->
						
					</ui>
				</div>
				<!-- /Channel List -->

				<!-- Footer -->
				<div class="card-footer"></div>
				<!-- /Footer -->
			</div>
		</div>
		<!-- /Channels Container -->

		<!-- Chat Container -->
		<div class="chat d-none" id="chat">
			<div class="card">

				<!-- Contact Header -->
				<div class="card-header msg_head">
					<div class="d-flex bd-highlight">
						<div class="img_cont">
							<img src="https://devilsworkshop.org/files/2013/01/enlarged-facebook-profile-picture.jpg" class="rounded-circle user_img">
							<!-- No way to determine online status for groups
							<span class="online_icon"></span>
							-->
						</div>
						<div class="user_info">
							<span>Chat with Maryam Naz</span>
							<p>1767 Messages</p>
						</div>
						<!-- CHANGED: Removed contact options
						<div class="video_cam">
							<span><i class="fas fa-video"></i></span>
							<span><i class="fas fa-phone"></i></span>
						</div>
						-->
					</div>
					<!-- CHANGED: Removed action menu
					<span id="action_menu_btn"><i class="fas fa-ellipsis-v"></i></span>
					<div class="action_menu">
						<ul>
							<li><i class="fas fa-user-circle"></i> View profile</li>
							<li><i class="fas fa-users"></i> Add to close friends</li>
							<li><i class="fas fa-plus"></i> Add to group</li>
							<li><i class="fas fa-ban"></i> Block</li>
						</ul>
					</div>
						-->
				</div>
				<!-- /Contact Header -->

				<!-- Chat Body -->
				<div class="card-body msg_card_body">
					<!-- Contact Message -->
					<div class="d-flex justify-content-start mb-4">
						<div class="img_cont_msg">
							<img src="https://devilsworkshop.org/files/2013/01/enlarged-facebook-profile-picture.jpg" class="rounded-circle user_img_msg">
						</div>
						<div class="msg_cotainer">
							Hi, how are you samim?
							<span class="msg_time">8:40 AM, Today</span>
						</div>
					</div>
					<!-- /Contact Message -->

					<!-- User Message -->
					<div class="d-flex justify-content-end mb-4">
						<div class="msg_cotainer_send">
							Hi Maryam i am good tnx how about you?
							<span class="msg_time_send">8:55 AM, Today</span>
						</div>
						<div class="img_cont_msg">
							<img src="https://devilsworkshop.org/files/2013/01/enlarged-facebook-profile-picture.jpg" class="rounded-circle user_img_msg">
						</div>
					</div>
					<!-- /User Message -->
				</div>
				<!-- /Chat Body -->

				<!-- Chat Send Area -->
				<div class="card-footer">
					<div class="input-group">
						<div class="input-group-append">
							<span class="input-group-text attach_btn">
								<input type="file" class="d-none">
								<i class="fas fa-paperclip"></i>
							</span>
						</div>
						<textarea name="" class="form-control type_msg" placeholder="Type your message..."></textarea>
						<div class="input-group-append">
							<span class="input-group-text send_btn">
								<i class="fas fa-location-arrow"></i>
							</span>
						</div>
					</div>
				</div>
				<!-- /Chat Send Area -->
			</div>
		</div>
		<!-- /Chat Container -->

		<!-- JavaScript Footer -->
		<script type="text/javascript" src="cordova.js"></script>
		<script type="text/javascript" src="js/dist/chat.bundle.js"></script>
	</body>
</html>
