<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="format-detection" content="telephone=no">
        <meta name="msapplication-tap-highlight" content="no">
        <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width">
        <link rel='dns-prefetch' href='//api.mapbox.com' />
        <link rel='dns-prefetch' href='//glam-squad-db.nygmarosebeauty.com' />
        <title>Sign In</title>
        <style>
          #loader {
            position: absolute;
            transition: all 0.3s ease-in-out;
            opacity: 1;
            display: default;
            height: 100vh;
            width: 100vw;
            background-color: white;
            z-index: 1000;
          }

          #loader.fadeOut {
            opacity: 0;
            display: none;
          }

          .spinner {
            height: 100vh;
            width: 100vw;
            position: absolute;
            background-image: url("assets/static/images/lips-loading_transparent.gif");
            background-repeat: no-repeat;
            background-size: contain;
            background-position: 50%;
            z-index: 100;
            background-color: #fff;
          }

          @-webkit-keyframes sk-scaleout {
            0% { -webkit-transform: scale(0) }
            100% {
              -webkit-transform: scale(1.0);
              opacity: 0;
            }
          }

          @keyframes sk-scaleout {
            0% {
              -webkit-transform: scale(0);
              transform: scale(0);
            } 100% {
              -webkit-transform: scale(1.0);
              transform: scale(1.0);
              opacity: 0;
            }
          }
        </style>
    </head>
    <body class="app">
        <!-- Loader -->
        <div id='loader'>
            <div class="spinner"></div>
        </div>

        <!-- Load Script-->
        <script>
            // On Cordova load dispatch page event
            document.addEventListener('deviceready', () => {
                const event = new CustomEvent('pageload', { detail:'signin' });
                document.dispatchEvent(event);
            }, false);
        </script>

        <!-- Page Body -->
        <div class="peers ai-s fxw-nw h-100vh">
            <div class="d-n@sm- peer peer-greed h-100 pos-r bgr-n bgpX-c bgpY-c bgsz-cv" style='background-image: url("assets/static/images/bg.jpg")'>
                <div class="pos-a centerXY">
                    <div class="bgc-white bdrs-50p pos-r" style='width: 120px; height: 120px;'>
                        <img class="pos-a centerXY" src="assets/static/images/logo.png" alt="">
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4 peer pX-40 pY-80 h-100 bgc-white scrollable pos-r" style='min-width: 320px;'>
                <h4 class="fw-300 c-grey-900 mB-40">Login</h4>
                <form action=''>
                    <div class="form-group">
                        <label class="text-normal text-dark">Username</label>
                        <input type="text" class="form-control" placeholder="Username" data-input="username" autocapitalize="none">
                    </div>
                    <div class="form-group">
                        <label class="text-normal text-dark">Password</label>
                        <input type="password" class="form-control" placeholder="Password" data-input="password">
                    </div>
                    <div class="form-group">
                        <div class="peers ai-c jc-sb fxw-nw">
                            <!-- <div class="peer">
                                <div class="checkbox checkbox-circle checkbox-info peers ai-c">
                                    <input type="checkbox" id="inputCall1" name="inputCheckboxesCall" class="peer">
                                    <label for="inputCall1" class=" peers peer-greed js-sb ai-c">
                                        <span class="peer peer-greed">Remember Me</span>
                                    </label>
                                </div>
                            </div> -->
                            <div class="peer">
                                <button type="button"class="btn btn-primary" data-role="register" data-toggle="modal" data-target="#register-dialog-modal">Register</button>
                            </div>
                            <div class="peer">
                                <button type="button"class="btn btn-primary" data-role="login">Login</button>
                            </div>
                        </div>
                    </div>
                    <div class="form-group ta-c">
                        <button type="button" class="btn btn-secondary" data-role="forgot-password" data-toggle="modal" data-target="#forgot-password-dialog-modal">Lost Password</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Profile Modal -->
        <div class="modal fade" id="register-dialog-modal" role="dialog" aria-labelledby="registerDialogModal" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" role="document">
                <div class="modal-content">
                    <!-- Modal Header -->
                    <div class="modal-header">
                        <h5 class="modal-title">New Artist</h5>
                    </div>

                    <!-- Modal body -->
                    <div class="modal-body">
                        <!-- Profile Input -->
                        <form action='' id='register-form'>
                            <div class="form-group">
                                <label>Country (If yours isn't listed, Glam Squad isn't available there yet)</label>
                                <select class="form-control" id="reg-country">
                                    <option value="SG">Singapore</option>
                                </select>
                            </div>
                            <div class='form-group'>
                                <label class="fw-500" for="reg-username">
                                    Username&nbsp;<i class="fas fa-user"></i>
                                </label>
                                <input type='text' name='username' class='form-control' id='reg-username' autocapitalize="none">
                            </div>
                            <div class='form-group'>
                                <label class="fw-500" for="new-email">
                                    Email&nbsp;<i class="fas fa-envelope"></i>
                                </label>
                                <input type='text' name='email' class='form-control' id='reg-email'>
                            </div>
                            <div class='form-group'>
                                <label class="fw-500" for="reg-password">
                                    Password&nbsp;<i class="fas fa-lock"></i>
                                </label>
                                <input type='password' name='password' class='form-control' id='reg-password'>
                            </div>
                            <div class='form-group'>
                                <label class="fw-500" for="reg-password2">
                                    Re-enter Password&nbsp;<i class="fas fa-lock"></i>
                                </label>
                                <input type='password' name='password2' class='form-control' id='reg-password2'>
                            </div>
                            <div class='form-group'>
                                <i class="fas fa-book-open"></i> Bio
                                <textarea name='bio' class='form-control' id='reg-bio' rows="5" placeholder="Certified makeup artist. Worked for Nicki & Cardi and provide the best brows you'll ever have&hellip;"></textarea>
                            </div>
                            <div class='form-group'>
                                <label class="fw-500" for="reg-role"><i class="fas fa-users"></i> Role</label>
                                <select class="form-control" id="reg-role" name="reg-role">
                                </select>
                            </div>
                            <div class='form-group'>
                                <i class="fab fa-instagram"></i> Instagram
                                <input type='text' name='instagram' class='form-control' id='reg-instagram' placeholder="nygmarose" autocapitalize="none">
                            </div>
                            <div class='form-group'>
                                <i class="fab fa-twitter"></i> Twitter
                                <input type='text' name='twitter' class='form-control' id='reg-twitter' placeholder="nygmarose" autocapitalize="none">
                            </div>
                            <div class='form-group'>
                                <i class="fab fa-facebook"></i> Facebook
                                <input type='text' name='facebook' class='form-control' id='reg-facebook' placeholder="nygmarosebeauty" autocapitalize="none">
                            </div>
                            <div class="form-group">
                                <label for="reg-portfolio" class="btn clr-primary" id="reg-portfolio-label">
                                    <i class="far fa-images"> Portfolio</i>
                                </label>
                                <input type="file" class="form-control d-none" id="reg-portfolio" name="reg-portfolio[]" multiple>
                            </div>
                            <div class="form-group grid" id="reg-portfolio-preview">
                                <div class='grid-col grid-col--1'></div>
                                <div class='grid-col grid-col--2'></div>
                                <div class='grid-col grid-col--3'></div>
                                <div class='grid-col grid-col--4'></div>
                            </div>
                        </form>
                    </div>

                    <!-- Modal footer -->
                    <div class="modal-footer">
                        <button type="button" class="btn clr-cancel" id="btn-cancel-register" data-dismiss="modal">Close</button>
                        <button type="button" class="btn clr-primary" data-role="register">Save</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Forgot Password Modal -->
        <div class="modal" id="forgot-password-dialog-modal" role="dialog" aria-labelledby="forgotPasswordDialogModal" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" role="document">
                <div class="modal-content">

                    <!-- Modal Header -->
                    <div class="modal-header">
                        <h5 class="modal-title">Forgot Password</h5>
                    </div>

                    <!-- Modal body -->
                    <div class="modal-body">
                        <!-- Modal Content -->
                        <form action='' id='forgot-password-form'>
                            <div class='form-group'>
                                <label class="fw-500" for="reg-username">
                                    Username&nbsp;<i class="fas fa-user"></i>
                                </label>
                                <input type='text' name='username' class='form-control' id='forgot-username' autocapitalize="none">
                            </div>
                        </form>
                    </div>

                    <!-- Modal footer -->
                    <div class="modal-footer">
                        <button type="button" class="btn clr-cancel" id="btn-cancel-forgot-password" data-dismiss="modal">Cancel</button>
                        <button type="button" class="btn clr-primary" id="btn-confirm-forgot-password">Submit</button>
                    </div>

                </div>
            </div>
        </div>
        <!-- /Modal Dialogs -->

        <!-- Cordova JS -->
        <script type="text/javascript" src="cordova.js"></script>
    </body>
</html>
